name: Build Vanta Linux ISO

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
    - name: Install build dependencies
      run: |
        pacman -Syu --noconfirm
        pacman -S --noconfirm \
          archiso \
          base-devel \
          git \
          rust \
          cargo \
          squashfs-tools \
          grub \
          dosfstools \
          mtools \
          xorriso \
          btrfs-progs \
          snapper \
          sudo
        pacman -Scc --noconfirm

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Create build user
      run: |
        useradd -m builder
        echo "builder ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builder
        mkdir -p "$GITHUB_WORKSPACE"
        chown -R builder:builder "$GITHUB_WORKSPACE"

    - name: Setup local repo and build packages
      run: |
        mkdir -p /repo/vanta/x86_64
        # Initialize empty pacman database so pacman doesn't reject transactions
        repo-add /repo/vanta/x86_64/vanta.db.tar.gz
        cat >> /etc/pacman.conf << 'PACMANEOF'

        [vanta]
        SigLevel = Optional TrustAll
        Server = file:///repo/vanta/$arch
        PACMANEOF
        pacman -Sy --noconfirm
        chown -R builder:builder /repo
        su builder -c "bash scripts/build-packages.sh --repo /repo/vanta"

    - name: Build ISO
      run: |
        bash scripts/build-iso.sh --clean

    - name: Upload ISO artifact
      uses: actions/upload-artifact@v4
      with:
        name: vanta-iso-${{ github.sha }}
        path: out/vanta-linux-*.iso
        retention-days: 30
        compression-level: 0


