# Vanta installer module: apply Vanta system settings after install
---
name: vanta-settings
type: job
interface: shell
script: |
  #!/bin/bash
  set -euo pipefail
  ROOT=/tmp/calamares-root

  # Apply dconf defaults
  if [ -f "${ROOT}/usr/share/vanta/dconf/defaults" ]; then
    dconf update
  fi

  # Enable systemd services
  systemctl --root="${ROOT}" enable vanta-updater.timer
  systemctl --root="${ROOT}" enable vanta-init.service
  systemctl --root="${ROOT}" enable vanta-tune.service
  systemctl --root="${ROOT}" enable NetworkManager
  systemctl --root="${ROOT}" enable bluetooth
  systemctl --root="${ROOT}" enable sddm
  systemctl --root="${ROOT}" enable fstrim.timer

  # Set default target to graphical
  systemctl --root="${ROOT}" set-default graphical.target

  # Enable snapper timeline for automatic snapshots
  snapper -c vanta-root set-config TIMELINE_CREATE="yes"

  # Configure NVIDIA DRM
  mkdir -p "${ROOT}/etc/modprobe.d"
  cat > "${ROOT}/etc/modprobe.d/nvidia.conf" << 'EOF'
options nvidia_drm modeset=1 fbdev=1
options nvidia NVreg_PreserveVideoMemoryAllocations=1
EOF

  # Configure AMD microcode
  mkdir -p "${ROOT}/etc/default/grub.d"
  cat > "${ROOT}/etc/default/grub.d/ucode.cfg" << 'EOF'
GRUB_CMDLINE_LINUX_DEFAULT="quiet splash nvidia-drm.modeset=1 nvidia-drm.fbdev=1"
GRUB_EARLY_INITRD_LINUX_CUSTOM="amd-ucode.img"
EOF
