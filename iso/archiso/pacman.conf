# Vanta Linux pacman.conf for ISO build
# Extends Arch default with Vanta repositories

[options]
HoldPkg      = pacman glibc
Architecture = auto
Color
CheckSpace
ILoveCandy
SigLevel     = Required DatabaseOptional
LocalFileSigLevel = Optional
NoConfirm

# Vanta custom repository (local builds)
[vanta]
SigLevel = Optional TrustAll
Server = file:///repo/vanta/$arch

# Official Arch repositories
[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[multilib]
Include = /etc/pacman.d/mirrorlist
