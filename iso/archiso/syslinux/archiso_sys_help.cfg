# Vanta Linux - SYSLINUX help text

MENU HELP MSG
Vanta Linux Live Environment
============================
Boot options:
  vanta          - Default: NVIDIA modeset enabled, KDE Plasma Wayland
  vantafallback  - Safe mode: disables NVIDIA modeset
  hdt            - Hardware Detection Tool
  reboot         - Reboot
  poweroff       - Power off
ENDHELP
